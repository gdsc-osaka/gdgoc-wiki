version: 2
updates:
  # web/ — pnpm packages
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
      biome:
        patterns:
          - "@biomejs/*"

  # terraform/ — Terraform provider versions
  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
