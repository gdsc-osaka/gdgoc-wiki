version: 2
updates:
  # web/ — pnpm packages
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"

  # terraform/ — Terraform provider versions
  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"
