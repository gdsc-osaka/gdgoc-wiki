name = "gdgoc-wiki"
main = "workers/app.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true
invocation_logs = true

# Resolve Vite's virtual module to the React Router server build output so
# wrangler can bundle workers/app.ts without needing Vite's dev server.
[alias]
"virtual:react-router/server-build" = "./build/server/index.js"

# Static assets are served alongside the Worker
[assets]
directory = "./build/client"
binding = "ASSETS"

[[routes]]
pattern = "wiki.gdgoc-osaka.jp/*"
zone_name = "gdgoc-osaka.jp"

[vars]
ENVIRONMENT = "production"
FIREBASE_API_KEY = "AIzaSyB7MPalhYWSgSWNMQ9rs3qqhk_TQg8IAHY"
FIREBASE_AUTH_DOMAIN = "gdgoc-wiki.firebaseapp.com"
FIREBASE_PROJECT_ID = "gdgoc-wiki"
FIREBASE_MESSAGING_SENDER_ID = "428142970890"
FIREBASE_APP_ID = "1:428142970890:web:b3ddb460c2a1cf5e9677f3"
FIREBASE_VAPID_KEY = "BJVifvLdXOTlkWG2srEiwp49xToB4bIPhf8d7yiL_ruDadJ0YaTJoY3S-_jQuYFYD3ZL_NXnKj-r7F7B60vpW9Q"

# ---------------------------------------------------------------------------
# Cloudflare D1 — managed SQLite database
# Replace `database_id` with the actual ID from `terraform output d1_database_id`
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "gdgoc-wiki-production-db"
database_id = "c5d3514d-7a55-42ec-a1e4-a13c77ac1329"
migrations_dir = "drizzle"

# ---------------------------------------------------------------------------
# Cloudflare R2 — object storage for page attachments / ingestion uploads
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gdgoc-wiki-production-storage"

# ---------------------------------------------------------------------------
# Cloudflare Queues — background translation / ingestion jobs
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "gdgoc-wiki-production-translation-jobs"

[[queues.producers]]
binding = "INGESTION_QUEUE"
queue = "gdgoc-wiki-production-ingestion-jobs"

[[queues.consumers]]
queue = "gdgoc-wiki-production-translation-jobs"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "gdgoc-wiki-production-ingestion-jobs"
max_batch_size = 1
max_batch_timeout = 5

# ---------------------------------------------------------------------------
# Cloudflare Browser Rendering — headless Chromium for PDF generation
# ---------------------------------------------------------------------------
[browser]
binding = "BROWSER"

# ---------------------------------------------------------------------------
# Workers AI (for bge-m3 embeddings)
# ---------------------------------------------------------------------------
[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Vectorize — semantic search index for page embeddings
# Create with: wrangler vectorize create gdgoc-wiki-production-pages --dimensions 1024 --metric cosine
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "VECTORIZE"
index_name = "gdgoc-wiki-production-pages"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put`)
# RESEND_API_KEY          — Resend transactional email API key
# WIKI_DISCORD_SECRET     — shared secret for Discord bot → wiki API auth
# FCM_SERVICE_ACCOUNT_JSON — Firebase service account key JSON (for push notifications)
# ---------------------------------------------------------------------------
