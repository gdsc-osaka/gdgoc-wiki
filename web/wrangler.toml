name = "gdgoc-wiki"
main = "workers/app.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Resolve Vite's virtual module to the React Router server build output so
# wrangler can bundle workers/app.ts without needing Vite's dev server.
[alias]
"virtual:react-router/server-build" = "./build/server/index.js"

# Static assets are served alongside the Worker
[assets]
directory = "./build/client"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"

# ---------------------------------------------------------------------------
# Cloudflare D1 — managed SQLite database
# Replace `database_id` with the actual ID from `terraform output d1_database_id`
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "gdgoc-wiki-production-db"
database_id = "48e8a415-9f80-4556-98c6-8aa283a0b7ab"
migrations_dir = "drizzle"

# ---------------------------------------------------------------------------
# Cloudflare R2 — object storage for page attachments / ingestion uploads
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gdgoc-wiki-production-storage"

# ---------------------------------------------------------------------------
# Cloudflare Queues — background translation jobs
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "gdgoc-wiki-production-translation-jobs"

[[queues.consumers]]
queue = "gdgoc-wiki-production-translation-jobs"
max_batch_size = 10
max_batch_timeout = 30
