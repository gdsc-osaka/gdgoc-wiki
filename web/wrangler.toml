name = "gdgoc-wiki"
main = "workers/app.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Static assets are served alongside the Worker
[assets]
directory = "./build/client"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"

# ---------------------------------------------------------------------------
# Cloudflare D1 — managed SQLite database
# Replace `database_id` with the actual ID from `terraform output d1_database_id`
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "gdgoc-wiki"
database_id = "placeholder-replace-with-actual-id"

# ---------------------------------------------------------------------------
# Cloudflare R2 — object storage for page attachments / ingestion uploads
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gdgoc-wiki"

# ---------------------------------------------------------------------------
# Cloudflare Queues — background translation jobs
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "translation-jobs"

[[queues.consumers]]
queue = "translation-jobs"
max_batch_size = 10
max_batch_timeout = 30
